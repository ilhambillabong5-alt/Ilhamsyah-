<!DOCTYPE html>
    <label>Pendidikan</label>

      <option>S2</option>
      <option>S3</option>
    </select>

    <h3>Data Bank</h3>
    <label>Nama Bank</label>
    <select name="bank">
      <option value="">Pilih Bank</option>
      <option>BRI</option>
      <option>BCA</option>
      <option>BNI</option>
      <option>Mandiri</option>
      <option>CIMB Niaga</option>
    </select>

    <label>Nomor Rekening</label>
    <input type="text" name="rekening">

    <h3>Data Transaksi</h3>
    <label>Tanggal Transaksi</label>
    <input type="date" name="tanggal_transaksi">

    <label>Uraian Transaksi</label>
    <textarea name="uraian"></textarea>

    <label>Jenis Transaksi</label>
    <div class="radio-group">
      <label><input type="radio" name="jenis" value="Debit"> Debit</label>
      <label><input type="radio" name="jenis" value="Kredit"> Kredit</label>
    </div>

    <label>Jumlah Debit</label>
    <input type="number" name="debit">

    <label>Jumlah Kredit</label>
    <input type="number" name="kredit">

    <button type="submit">Kirim Data</button>
  </form>
</div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbwsS60p6LgUQnZz8N0Pf_DuJsTeHK931GvXpmpDIZ0VXgITZSlr4KJrzJIJ0MCJbtyg/exec";
  const form = document.getElementById('dataForm');

  form.addEventListener('submit', e => {
    e.preventDefault();

    fetch(scriptURL, {
      method: 'POST',
      body: new FormData(form)
    })
    .then(response => {
      alert("Data berhasil dikirim!");
      form.reset();
    })
    .catch(error => alert("Gagal mengirim data"));
  });
</script>

</body>
</html>
