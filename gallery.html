<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Treasure Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle,#1e293b,#020617);
    color:#facc15;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background: rgba(0,0,0,0.6);
}

nav h1{
    font-family:'Pirata One';
    color:#facc15;
}

nav ul{
    display:flex;
    list-style:none;
}

nav li{
    margin-left:20px;
}

nav a{
    color:#facc15;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:white;
}

/* Container */
.container{
    padding:50px;
    text-align:center;
}

.container h2{
    font-family:'Pirata One';
    font-size:2.5rem;
    margin-bottom:20px;
}

/* Treasure Grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* Card */
.card{
    position:relative;
    border-radius:15px;
    overflow:hidden;
    border:3px solid #facc15;
    box-shadow:0 0 20px rgba(250,204,21,0.5);
    cursor:pointer;
}

/* Image */
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

/* Overlay */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:0.5s;
}

/* Text */
.overlay h3{
    font-family:'Pirata One';
    font-size:1.5rem;
    color:#facc15;
    text-shadow:0 0 10px gold;
}

/* Hover effect */
.card:hover img{
    transform:scale(1.2);
    filter:brightness(0.6);
}

.card:hover .overlay{
    opacity:1;
}

/* Treasure icon */
.card::before{
    content:"💰";
    position:absolute;
    top:10px;
    left:10px;
    font-size:1.5rem;
}

/* Glow animation */
@keyframes glow{
    0%{box-shadow:0 0 10px gold;}
    50%{box-shadow:0 0 25px gold;}
    100%{box-shadow:0 0 10px gold;}
}

.card:hover{
    animation:glow 1s infinite;
}
</style>

</head>

<body>

<nav>
    <h1>Treasure Gallery 🏴‍☠️</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="biodata.html">Biodata</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="video.html">Video</a></li>
    </ul>
</nav>

<div class="container">
    <h2>Jangan tapi dilihati</h2>

    <div class="gallery">

        <div class="card">
            <img src="assets/gambar1.jpg">
            <div class="overlay">
                <h3>Harta 1</h3>
            </div>
        </div>

        <div class="card">
            <img src="assets/gambar2.jpg">
            <div class="overlay">
                <h3>Harta 2</h3>
            </div>
        </div>

        <div class="card">
            <img src="assets/gambar3.jpg">
            <div class="overlay">
                <h3>Harta 3</h3>
            </div>
        </div>

    </div>
</div>

</body>
</html>
